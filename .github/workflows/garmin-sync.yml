name: Garmin sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC = 7:00am Mountain (MDT) / 6:00am Mountain (MST)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GARMINTOKENS: ${{ secrets.GARMIN_TOKENS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python sync_garmin.py --days 3 --out garmin

      - run: python build_dashboard.py

      - name: Commit updated data
        run: |
          git config user.name "garmin-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add garmin/ docs/
          git diff --cached --quiet || git commit -m "Sync Garmin data and rebuild dashboard"
          git push
